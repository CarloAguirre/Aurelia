name: Apply inspection detail result integration

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/apply-inspection-detail-result.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Connect web checklist result
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/src/modules/inspections/components/InspectionDetailRealDataModal.tsx')
          text = path.read_text()
          anchor = "import { FindingExecutionModeView } from './FindingExecutionModeView';\n"
          addition = anchor + "import { InspectionChecklistResultPanel } from './InspectionChecklistResultPanel';\n"
          if "InspectionChecklistResultPanel" not in text:
              text = text.replace(anchor, addition, 1)
          placeholder = "function ChecklistResultPanel() {\n  return <div className=\"min-h-0 flex-1 overflow-y-auto bg-white\" />;\n}\n\n"
          text = text.replace(placeholder, '', 1)
          text = text.replace("return <ChecklistResultPanel />;", "return <InspectionChecklistResultPanel result={detail.checklistResult} />;", 1)
          path.write_text(text)
          PY
          git add apps/web/src/modules/inspections/components/InspectionDetailRealDataModal.tsx
          git commit -m "feat(web): consume checklist result from inspection detail"
      - name: Connect mobile checklist result
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx')
          text = path.read_text()
          anchor = "import { PhotoSourceSheet } from '../../shared/components/form/PhotoSourceSheet';\n"
          addition = anchor + "import { MobileInspectionChecklistResultPanel } from './MobileInspectionChecklistResultPanel';\n"
          if "MobileInspectionChecklistResultPanel" not in text:
              text = text.replace(anchor, addition, 1)
          old = """            {activeTab === 'result' ? (\n              <View style={styles.tabContent}>\n                <View style={styles.generalSection}>\n                  <Text style={styles.generalTitle}>Resultado completo</Text>\n                  <Text style={styles.resultText}>\n                    La API de detalle actual expone el resumen y los ítems no conformes. El reporte completo\n                    continúa disponible en la exportación de la inspección.\n                  </Text>\n                </View>\n              </View>\n            ) : null}\n"""
          new = """            {activeTab === 'result' ? (\n              <MobileInspectionChecklistResultPanel result={detail.checklistResult} />\n            ) : null}\n"""
          if old not in text:
              raise SystemExit('Mobile result placeholder not found')
          text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          git add apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx
          git commit -m "feat(mobile): consume checklist result from inspection detail"
      - name: Remove temporary workflow
        run: |
          git rm .github/workflows/apply-inspection-detail-result.yml
          git commit -m "chore: remove checklist result integration workflow"
      - name: Push commits
        run: git push origin HEAD:feature/inspecciones/carlo
