# .github/workflows/deploy-dev.yml
# ⚠️ Este archivo va en el REPO DE LA APP (código Node/Vite), NO en aurelia-terraform (solo infra).
#    Aquí se guarda como REFERENCIA para copiar. En este repo (docs/) no se ejecuta.
#
# Despliega a DEV:
#   - backend  -> App Service Linux Node  (app-gf-aurelia-back-dev-001)
#   - frontend -> Static Web App (Vite)   (webs-gf-aurelia-front-dev-001)
#
# El build (install + contracts + api/web) corre AQUÍ, una sola vez. El App Service solo ARRANCA
# (backend_app_command_line = "corepack prepare pnpm@9.12.0 --activate && pnpm start:prod").
#
# Secrets/variables necesarios en el Environment "dev" de GitHub:
#   secrets.AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID   (OIDC)
#   secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV                          (deployment token del SWA de dev)
# El SP de OIDC necesita permiso de deploy sobre el App Service (Website Contributor o Contributor).
#
# 👉 Todo esto (federated credential + Environment + los 4 secrets) lo deja listo, en el repo de la app,
#    el script del repo de infra:  scripts/paso-13-app-deploy.sh dev 001 <owner/repo>  (o su .ps1).

name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/contracts/**" # ajusta a la ruta real del paquete @aurelia/contracts
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC hacia Azure
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.12.0"

jobs:
  # ---------------------------------------------------------------------------
  # BACKEND — App Service Linux Node
  # ---------------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activar pnpm (pineado)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Cache de pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build contracts + api
        run: |
          pnpm --filter @aurelia/contracts build
          pnpm --filter api build

      # Bundle self-contained y podado a prod-deps (evita subir devDependencies).
      # Genera ./deploy con la API + su node_modules de producción.
      - name: Empaquetar API (deploy --prod)
        run: pnpm --filter api deploy --prod ./deploy

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy a App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-gf-aurelia-back-dev-001
          package: ./deploy

      - name: Resolve DB settings from App Service
        shell: bash
        run: |
          set -euo pipefail

          APP_NAME="app-gf-aurelia-back-dev-001"
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${APP_NAME}'].resourceGroup | [0]" -o tsv)

          if [ -z "${RESOURCE_GROUP}" ]; then
            echo "No se pudo resolver resource group para ${APP_NAME}"
            exit 1
          fi

          DB_HOST=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_HOST'].value | [0]" -o tsv)
          DB_PORT=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_PORT'].value | [0]" -o tsv)
          DB_USERNAME=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_USERNAME'].value | [0]" -o tsv)
          DB_PASSWORD=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_PASSWORD'].value | [0]" -o tsv)
          DB_NAME=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_NAME'].value | [0]" -o tsv)
          DB_SSL=$(az webapp config appsettings list -g "${RESOURCE_GROUP}" -n "${APP_NAME}" --query "[?name=='DB_SSL'].value | [0]" -o tsv)

          resolve_keyvault_reference() {
            local value="$1"
            if [[ "$value" =~ ^@Microsoft.KeyVault\(SecretUri=(.*)\)$ ]]; then
              local secret_uri="${BASH_REMATCH[1]}"
              az keyvault secret show --id "$secret_uri" --query value -o tsv
            else
              printf '%s' "$value"
            fi
          }

          DB_HOST=$(resolve_keyvault_reference "${DB_HOST}")
          DB_PORT=$(resolve_keyvault_reference "${DB_PORT}")
          DB_USERNAME=$(resolve_keyvault_reference "${DB_USERNAME}")
          DB_PASSWORD=$(resolve_keyvault_reference "${DB_PASSWORD}")
          DB_NAME=$(resolve_keyvault_reference "${DB_NAME}")
          DB_SSL=$(resolve_keyvault_reference "${DB_SSL}")

          if [ -z "${DB_HOST}" ] || [ -z "${DB_PORT}" ] || [ -z "${DB_USERNAME}" ] || [ -z "${DB_PASSWORD}" ] || [ -z "${DB_NAME}" ]; then
            echo "Faltan DB_* en App Service ${APP_NAME}"
            exit 1
          fi

          if [ -z "${DB_SSL}" ]; then
            DB_SSL="true"
          fi

          echo "::add-mask::${DB_PASSWORD}"

          echo "DB_HOST=${DB_HOST}" >> "$GITHUB_ENV"
          echo "DB_PORT=${DB_PORT}" >> "$GITHUB_ENV"
          echo "DB_USERNAME=${DB_USERNAME}" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=${DB_PASSWORD}" >> "$GITHUB_ENV"
          echo "DB_NAME=${DB_NAME}" >> "$GITHUB_ENV"
          echo "DB_SSL=${DB_SSL}" >> "$GITHUB_ENV"

      - name: Run DB migrations + seed base
        shell: bash
        run: |
          set -euo pipefail

          export DB_SYNCHRONIZE="false"
          export PORT="3000"
          export CORS_ORIGINS="http://localhost"
          export API_TOKEN_KEY="ci-bootstrap-token-key-32chars-min"
          export API_TOKEN_TTL_SECONDS="3600"
          export API_SESSION_TTL_SECONDS="2592000"
          export API_RATE_LIMIT_STORE="memory"
          export API_RATE_LIMIT_WINDOW_MS="60000"
          export API_RATE_LIMIT_MAX="180"
          export API_LOGIN_PASSWORD="ci-bootstrap-login"
          export AURELIA_DEMO_USER_PASSWORD="ci-bootstrap-demo"
          export ANTHROPIC_API_KEY=""

          pnpm --filter api migration:run
          pnpm --filter api seed

      # ⚠️ Con "deploy --prod ./deploy", wwwroot pasa a ser la RAÍZ del bundle (ya es apps/api),
      #    por eso el startup NO hace "cd apps/api". El tfvars de este repo usa (Opción A):
      #      backend_app_command_line = "corepack prepare pnpm@9.12.0 --activate && pnpm start:prod"
      #    Si en cambio publicas el monorepo completo (package: .), vuelve a "cd apps/api && ...".

  # ---------------------------------------------------------------------------
  # FRONTEND — Static Web App (Vite). Variables VITE_* son build-time.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: dev
    env:
      VITE_APP_ENV: dev
      VITE_APP_NAME: "Aurelia"
      VITE_API_URL: "https://api-aurelia-dev.kabeli.cl/api"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activar pnpm (pineado)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Cache de pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build contracts + web
        run: |
          pnpm --filter @aurelia/contracts build
          pnpm --filter web build

      # Subimos el build ya hecho (skip_app_build), Oryx no re-compila el monorepo.
      - name: Deploy a Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "apps/web/dist" # carpeta ya construida (ajusta si Vite usa otra salida)
          output_location: ""
