# .github/workflows/deploy-dev.yml
# ⚠️ Este archivo va en el REPO DE LA APP (código Node/Vite), NO en aurelia-terraform (solo infra).
#    Aquí se guarda como REFERENCIA para copiar. En este repo (docs/) no se ejecuta.
#
# Despliega a DEV:
#   - backend  -> App Service Linux Node  (app-gf-aurelia-back-dev-001)
#   - frontend -> Static Web App (Vite)   (webs-gf-aurelia-front-dev-001)
#
# El build (install + contracts + api/web) corre AQUÍ, una sola vez. El App Service solo ARRANCA
# (backend_app_command_line = "corepack prepare pnpm@9.12.0 --activate && pnpm start:prod").
#
# Secrets/variables necesarios en el Environment "dev" de GitHub:
#   secrets.AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID   (OIDC)
#   secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV                          (deployment token del SWA de dev)
#   secrets.DB_HOST / DB_PORT / DB_USERNAME / DB_PASSWORD / DB_NAME      (credenciales de PostgreSQL)
#   secrets.DB_SSL                                                        (usar true en Azure PostgreSQL)
# El SP de OIDC necesita permiso de deploy sobre el App Service (Website Contributor o Contributor).
#
# 👉 Todo esto (federated credential + Environment + los 4 secrets) lo deja listo, en el repo de la app,
#    el script del repo de infra:  scripts/paso-13-app-deploy.sh dev 001 <owner/repo>  (o su .ps1).

name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "packages/contracts/**" # ajusta a la ruta real del paquete @aurelia/contracts
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-dev.yml"
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC hacia Azure
  contents: read

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.12.0"

jobs:
  # ---------------------------------------------------------------------------
  # BACKEND — App Service Linux Node
  # ---------------------------------------------------------------------------
  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activar pnpm (pineado)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Cache de pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build contracts + api
        run: |
          pnpm --filter @aurelia/contracts build
          pnpm --filter api build

      # Bundle self-contained y podado a prod-deps (evita subir devDependencies).
      # Genera ./deploy con la API + su node_modules de producción.
      - name: Empaquetar API (deploy --prod)
        run: pnpm --filter api deploy --prod ./deploy

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy a App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-gf-aurelia-back-dev-001
          package: ./deploy

      - name: Run DB migrations + seed base
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_SSL: ${{ secrets.DB_SSL }}
          DB_SYNCHRONIZE: "false"
          PORT: "3000"
          CORS_ORIGINS: "http://localhost"
          API_TOKEN_KEY: "ci-bootstrap-token-key-32chars-min"
          API_TOKEN_TTL_SECONDS: "3600"
          API_SESSION_TTL_SECONDS: "2592000"
          API_RATE_LIMIT_STORE: "memory"
          API_RATE_LIMIT_WINDOW_MS: "60000"
          API_RATE_LIMIT_MAX: "180"
          API_LOGIN_PASSWORD: "ci-bootstrap-login"
          AURELIA_DEMO_USER_PASSWORD: "ci-bootstrap-demo"
          ANTHROPIC_API_KEY: ""
        run: |
          pnpm --filter api migration:run
          pnpm --filter api seed

      # ⚠️ Con "deploy --prod ./deploy", wwwroot pasa a ser la RAÍZ del bundle (ya es apps/api),
      #    por eso el startup NO hace "cd apps/api". El tfvars de este repo usa (Opción A):
      #      backend_app_command_line = "corepack prepare pnpm@9.12.0 --activate && pnpm start:prod"
      #    Si en cambio publicas el monorepo completo (package: .), vuelve a "cd apps/api && ...".

  # ---------------------------------------------------------------------------
  # FRONTEND — Static Web App (Vite). Variables VITE_* son build-time.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    environment: dev
    env:
      VITE_APP_ENV: dev
      VITE_APP_NAME: "Aurelia"
      VITE_API_URL: "https://api-aurelia-dev.kabeli.cl/api"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Activar pnpm (pineado)
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: Cache de pnpm
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Build contracts + web
        run: |
          pnpm --filter @aurelia/contracts build
          pnpm --filter web build

      # Subimos el build ya hecho (skip_app_build), Oryx no re-compila el monorepo.
      - name: Deploy a Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEV }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "apps/web/dist" # carpeta ya construida (ajusta si Vite usa otra salida)
          output_location: ""
