name: Fidelize mobile inspection detail

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/fidelize-mobile-inspection-detail.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Apply pixel-perfect mobile detail shell
        shell: python
        run: |
          from pathlib import Path

          path = Path('apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx')
          text = path.read_text(encoding='utf-8')

          replacements = [
            (
              "  SafeAreaView,\n",
              "",
            ),
            (
              "  icon: 'check-circle' | 'clock' | 'times-circle';",
              "  icon: 'check-circle' | 'clock' | 'times-circle' | 'exclamation-circle';",
            ),
            (
              "  { key: 'executed', label: 'Ejecutadas', singular: 'Ejecutada', color: colors.dangerTxt, background: colors.dangerSurf, icon: 'check-circle' },\n"
              "  { key: 'open', label: 'Abiertas', singular: 'Abierto', color: colors.warnTxt, background: colors.warnSurf, icon: 'clock' },\n"
              "  { key: 'closed', label: 'Cerradas', singular: 'Cerrado', color: colors.successTxt, background: colors.successSurf, icon: 'check-circle' },\n"
              "  { key: 'rejected', label: 'Rechazadas', singular: 'Rechazado', color: colors.muted, background: '#f1f1f1', icon: 'times-circle' },",
              "  { key: 'executed', label: 'Ejecutadas', singular: 'Ejecutada', color: colors.dangerTxt, background: colors.dangerSurf, icon: 'exclamation-circle' },\n"
              "  { key: 'open', label: 'Abiertas', singular: 'Abierta', color: colors.warnTxt, background: colors.warnSurf, icon: 'clock' },\n"
              "  { key: 'closed', label: 'Cerradas', singular: 'Cerrada', color: colors.successTxt, background: colors.successSurf, icon: 'check-circle' },\n"
              "  { key: 'rejected', label: 'Rechazadas', singular: 'Rechazada', color: colors.muted, background: '#f7f7f7', icon: 'exclamation-circle' },",
            ),
            (
              "  singular: 'Abierto',",
              "  singular: 'Abierta',",
            ),
            (
              "function allFindings(detail: InspectionDetailResponse): InspectionDetailFindingItemResponse[] {\n"
              "  return groups.flatMap((group) => detail.findings[group.key] ?? []);\n"
              "}\n",
              "function allFindings(detail: InspectionDetailResponse): InspectionDetailFindingItemResponse[] {\n"
              "  return groups.flatMap((group) => detail.findings[group.key] ?? []);\n"
              "}\n\n"
              "function groupCounterLabel(group: GroupConfig, count: number): string {\n"
              "  return count === 1 ? group.singular : group.label;\n"
              "}\n",
            ),
            (
              "                {readOnly ? <Text style={styles.headerReadOnly}>Solo lectura</Text> : null}\n",
              "",
            ),
            (
              "                  <Text style={[styles.counterText, { color: group.color }]}>{detail.header.counts[group.key]} {group.label}</Text>",
              "                  <Text style={[styles.counterText, { color: group.color }]}>{detail.header.counts[group.key]} {groupCounterLabel(group, detail.header.counts[group.key])}</Text>",
            ),
            (
              "              <FontAwesome5 name={open ? 'chevron-up' : 'chevron-down'} size={13} color={colors.muted} />",
              "              <FontAwesome5 name={open ? 'chevron-up' : 'chevron-down'} size={12} color={colors.primary} solid />",
            ),
            (
              "    <Modal visible={visible} animationType=\"slide\" presentationStyle=\"fullScreen\" onRequestClose={onClose}>\n"
              "      <SafeAreaView style={styles.screen}>",
              "    <Modal visible={visible} transparent statusBarTranslucent animationType=\"slide\" onRequestClose={onClose}>\n"
              "      <View style={styles.modalRoot}>\n"
              "        <TouchableOpacity style={styles.modalBackdrop} activeOpacity={1} onPress={onClose} accessibilityLabel=\"Cerrar detalle\" />\n"
              "        <View style={styles.screen}>",
            ),
            (
              "      </SafeAreaView>\n\n"
              "      <ActionDialog",
              "        </View>\n      </View>\n\n"
              "      <ActionDialog",
            ),
            (
              "  screen: { flex: 1, backgroundColor: colors.white, borderTopLeftRadius: 16, borderTopRightRadius: 16, overflow: 'hidden' },",
              "  modalRoot: { flex: 1, justifyContent: 'flex-end' },\n"
              "  modalBackdrop: { ...StyleSheet.absoluteFillObject, backgroundColor: 'rgba(19,19,19,0.75)' },\n"
              "  screen: { width: '100%', height: '95.375%', maxHeight: 763, backgroundColor: colors.white, borderTopLeftRadius: 16, borderTopRightRadius: 16, overflow: 'hidden' },",
            ),
            (
              "  header: { minHeight: 110, paddingHorizontal: 14, paddingVertical: 12, backgroundColor: colors.white, borderBottomWidth: 1, borderBottomColor: colors.border, flexDirection: 'row', alignItems: 'flex-start', justifyContent: 'space-between' },",
              "  header: { minHeight: 111, paddingHorizontal: 14, paddingVertical: 12, backgroundColor: colors.white, flexDirection: 'row', alignItems: 'flex-start', justifyContent: 'space-between' },",
            ),
            (
              "  headerTitle: { marginTop: 2, color: colors.body, fontSize: 16, lineHeight: 22, fontWeight: fontWeight.bold },",
              "  headerTitle: { color: colors.body, fontSize: 16, lineHeight: 22, letterSpacing: 0.32, fontWeight: fontWeight.bold },",
            ),
            (
              "  headerMetadata: { marginTop: 4, alignItems: 'flex-start', gap: 2 },",
              "  headerMetadata: { alignItems: 'flex-start' },",
            ),
            (
              "  headerMetaText: { color: colors.muted, fontSize: 11, lineHeight: 14 },",
              "  headerMetaText: { color: colors.muted, fontSize: 11, lineHeight: 13, fontWeight: fontWeight.bold },",
            ),
            (
              "  counterRow: { marginTop: 6, flexDirection: 'row', flexWrap: 'wrap', gap: 5 },",
              "  counterRow: { marginTop: 6, minHeight: 16, flexDirection: 'row', alignItems: 'center', gap: 5 },",
            ),
            (
              "  counter: { minHeight: 16, borderRadius: 5, flexDirection: 'row', alignItems: 'center', gap: 3, paddingHorizontal: 7, paddingVertical: 2 },",
              "  counter: { height: 16, borderRadius: 5, flexDirection: 'row', alignItems: 'center', gap: 3, paddingHorizontal: 7, paddingVertical: 2 },",
            ),
            (
              "  counterText: { fontSize: 9, lineHeight: 11, fontWeight: fontWeight.bold },",
              "  counterText: { fontSize: 10, lineHeight: 12, fontWeight: fontWeight.semibold },",
            ),
            (
              "  bodyContent: { flexGrow: 1, paddingBottom: 16 },",
              "  bodyContent: { flexGrow: 1 },",
            ),
          ]

          for old, new in replacements:
            count = text.count(old)
            if count != 1:
              raise SystemExit(f'Expected one match, found {count}: {old[:100]!r}')
            text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')

      - name: Commit mobile detail fidelity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx
          git commit -m "fix(mobile): fidelize inspection detail modal"
          git push origin feature/inspecciones/carlo

      - name: Remove temporary workflow
        run: |
          git rm .github/workflows/fidelize-mobile-inspection-detail.yml
          git commit -m "chore: remove mobile detail fidelity workflow"
          git push origin feature/inspecciones/carlo
