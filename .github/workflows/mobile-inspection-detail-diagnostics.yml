name: Mobile inspection detail diagnostics

on:
  push:
    branches:
      - feat/mobile-inspection-detail-fidelity
    paths:
      - .github/workflows/mobile-inspection-detail-diagnostics.yml

permissions:
  contents: write

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-inspection-detail-fidelity
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture diagnostics
        run: |
          set +e
          pnpm --filter mobile-inspecciones typecheck > tmp-mobile-validation.log 2>&1
          TYPECHECK_EXIT=$?
          pnpm --filter mobile-inspecciones lint >> tmp-mobile-validation.log 2>&1
          LINT_EXIT=$?
          printf '\nTYPECHECK_EXIT=%s\nLINT_EXIT=%s\n' "$TYPECHECK_EXIT" "$LINT_EXIT" >> tmp-mobile-validation.log
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tmp-mobile-validation.log
          git commit -m "Chore: registra diagnóstico mobile"
          git push origin HEAD:feat/mobile-inspection-detail-fidelity
