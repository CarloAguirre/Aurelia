name: Mobile inspection detail Figma fidelity

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/mobile-inspection-detail-figma-fidelity.yml

permissions:
  contents: write

jobs:
  fidelize-detail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Apply Figma fidelity patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx')
          text = path.read_text()

          def replace_once(old: str, new: str, label: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              text = text.replace(old, new, 1)

          replace_once(
              "{ key: 'open', label: 'Abiertas', singular: 'Abierta', color: colors.warnTxt, background: colors.warnSurf, icon: 'clock' },",
              "{ key: 'open', label: 'Abiertas', singular: 'Abierto', color: colors.warnTxt, background: colors.warnSurf, icon: 'clock' },",
              'open status copy',
          )
          replace_once(
              "{ key: 'closed', label: 'Cerradas', singular: 'Cerrada', color: colors.successTxt, background: colors.successSurf, icon: 'check-circle' },",
              "{ key: 'closed', label: 'Cerradas', singular: 'Cerrado', color: colors.successTxt, background: colors.successSurf, icon: 'check-circle' },",
              'closed status copy',
          )
          replace_once(
              "{ key: 'rejected', label: 'Rechazadas', singular: 'Rechazada', color: colors.muted, background: '#f7f7f7', icon: 'times-circle' },",
              "{ key: 'rejected', label: 'Rechazadas', singular: 'Rechazado', color: colors.muted, background: '#f1f1f1', icon: 'times-circle' },",
              'rejected status copy',
          )
          replace_once("singular: 'Abierta',", "singular: 'Abierto',", 'fallback status copy')

          replace_once(
              "  onReject,\n}: {\n  inspectionId: string;",
              "  onReject,\n  itemLabel,\n}: {\n  inspectionId: string;",
              'finding prop destructuring',
          )
          replace_once(
              "  onReject: (item: InspectionDetailFindingItemResponse) => void;\n}) {",
              "  onReject: (item: InspectionDetailFindingItemResponse) => void;\n  itemLabel: 'Obs.' | 'Ítem';\n}) {",
              'finding prop type',
          )
          replace_once(
              '<View style={[styles.findingCard, item.statusGroup === \'executed\' && styles.findingCardReview]}>',
              '<View style={styles.findingCard}>',
              'finding card style',
          )
          replace_once(
              '<View style={styles.indexPill}><Text style={styles.indexPillText}>Obs. {index + 1}</Text></View>',
              '<View style={styles.indexPill}><Text style={styles.indexPillText}>{itemLabel} {index + 1}</Text></View>',
              'finding label',
          )
          replace_once(
              "{item.statusGroup === 'rejected' ? 'Ejecutar observación rechazada' : 'Ejecutar observación'}",
              "{item.statusGroup === 'rejected' ? 'Reenviar evidencia' : 'Ejecutar observación'}",
              'rejected action copy',
          )
          replace_once(
              "                    onReject={onReject}\n                  />",
              "                    onReject={onReject}\n                    itemLabel={detail.header.kind === 'checklist' ? 'Ítem' : 'Obs.'}\n                  />",
              'finding item label use',
          )

          general_pattern = re.compile(r"function GeneralPanel\([\s\S]*?\n}\n\nexport function MobileInspectionDetailModal")
          general_replacement = '''function GeneralSectionCard({
            icon,
            title,
            children,
          }: {
            icon: string;
            title: string;
            children: React.ReactNode;
          }) {
            return (
              <View style={styles.generalSectionCard}>
                <View style={styles.generalSectionHeader}>
                  <FontAwesome5 name={icon} size={11} color={colors.blueLink} />
                  <Text style={styles.generalSectionTitle}>{title}</Text>
                </View>
                <View>{children}</View>
              </View>
            );
          }

          function GeneralPanel({
            detail,
            readOnly,
            canReassign,
            onReassign,
          }: {
            detail: InspectionDetailResponse;
            readOnly: boolean;
            canReassign: boolean;
            onReassign: () => void;
          }) {
            const general = detail.general;
            const inspectionType = detail.header.kind === 'checklist' ? 'Checklist normativo' : 'Hallazgo';
            const areaSector = [general.areaName, general.sectorName].filter(Boolean).join(' · ') || '—';
            return (
              <View style={styles.tabContent}>
                <GeneralSectionCard icon="user-tie" title="QUIÉN REALIZÓ LA INSPECCIÓN">
                  <GeneralRow label="Nombre" value={general.inspectorName ?? '—'} />
                  <GeneralRow label="Empresa" value={general.inspectorCompanyName ?? general.companyName ?? '—'} />
                </GeneralSectionCard>

                <GeneralSectionCard icon="map-marker-alt" title="DÓNDE Y CUÁNDO">
                  <GeneralRow label="Área · Sector" value={areaSector} />
                  <GeneralRow label="Fecha" value={formatDate(general.scheduledAt)} />
                  <GeneralRow label="Tipo" value={inspectionType} />
                  {general.templateName ? <GeneralRow label="Plantilla" value={general.templateName} /> : null}
                  {general.templateCode ? <GeneralRow label="Código" value={general.templateCode} /> : null}
                  <GeneralRow label="Ubicación UTM" value={coordinates(detail)} mono />
                </GeneralSectionCard>

                {general.responsibles.length > 0 ? (
                  <GeneralSectionCard icon="user-friends" title="RESPONSABLES">
                    {general.responsibles.map((responsible, index) => (
                      <View key={responsible.userId} style={[styles.generalResponsible, index < general.responsibles.length - 1 && styles.generalResponsibleBorder]}>
                        <View style={styles.avatar}><Text style={styles.avatarText}>{initials(responsible.fullName)}</Text></View>
                        <View style={styles.responsibleCopy}>
                          <Text style={styles.responsibleName}>{responsible.fullName}</Text>
                          <Text style={styles.responsibleRole}>{responsible.position ?? responsible.companyName ?? 'Sin cargo'}</Text>
                        </View>
                        {responsible.currentUser ? <View style={styles.youPill}><Text style={styles.youPillText}>Tú</Text></View> : null}
                      </View>
                    ))}
                    {!readOnly && canReassign ? (
                      <TouchableOpacity style={styles.reassignButton} onPress={onReassign}>
                        <FontAwesome5 name="user-edit" size={13} color={colors.blueLink} />
                        <Text style={styles.reassignText}>Reasignar responsables</Text>
                      </TouchableOpacity>
                    ) : null}
                  </GeneralSectionCard>
                ) : null}
              </View>
            );
          }

          export function MobileInspectionDetailModal'''
          text, count = general_pattern.subn(general_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'general panel: expected one match, found {count}')

          replace_once(
              '<FontAwesome5 name="times" size={16} color="rgba(255,255,255,0.75)" />',
              '<FontAwesome5 name="times" size={16} color={colors.primary} />',
              'close icon',
          )
          replace_once('{detail && !forceReadOnly ? (', '{detail ? (', 'progress visibility')

          footer_anchor = '''          </ScrollView>
        ) : null}
      </SafeAreaView>'''
          footer_replacement = '''          </ScrollView>
        ) : null}
        {detail ? (
          <View style={styles.footer}>
            <TouchableOpacity
              style={styles.pdfButton}
              onPress={() => Alert.alert('Descargar PDF', 'La exportación PDF autenticada está disponible actualmente desde la versión web.')}
            >
              <FontAwesome5 name="file-pdf" size={13} color={colors.body} />
              <Text style={styles.pdfButtonText}>Descargar PDF</Text>
            </TouchableOpacity>
          </View>
        ) : null}
      </SafeAreaView>'''
          replace_once(footer_anchor, footer_replacement, 'fixed footer')

          style_replacements = {
            "  screen: { flex: 1, backgroundColor: colors.white },": "  screen: { flex: 1, backgroundColor: colors.white, borderTopLeftRadius: 16, borderTopRightRadius: 16, overflow: 'hidden' },",
            "  header: { minHeight: 91, paddingHorizontal: 20, paddingVertical: 16, backgroundColor: colors.navy, flexDirection: 'row', alignItems: 'flex-start', justifyContent: 'space-between' },": "  header: { minHeight: 88, paddingHorizontal: 14, paddingVertical: 12, backgroundColor: colors.white, borderBottomWidth: 1, borderBottomColor: colors.border, flexDirection: 'row', alignItems: 'flex-start', justifyContent: 'space-between' },",
            "  headerEyebrow: { color: 'rgba(255,255,255,0.55)', fontSize: 13, lineHeight: 16, fontWeight: fontWeight.bold },": "  headerEyebrow: { color: colors.navy, fontSize: 13, lineHeight: 16, fontWeight: fontWeight.bold },",
            "  headerTitle: { marginTop: 2, color: colors.white, fontSize: 16, lineHeight: 20, fontWeight: fontWeight.bold },": "  headerTitle: { marginTop: 2, color: colors.body, fontSize: 16, lineHeight: 22, fontWeight: fontWeight.bold },",
            "  headerMetadata: { minHeight: 22, marginTop: 4, flexDirection: 'row', alignItems: 'center', flexWrap: 'wrap', gap: 6 },": "  headerMetadata: { minHeight: 20, marginTop: 5, flexDirection: 'row', alignItems: 'center', flexWrap: 'wrap', gap: 5 },",
            "  headerMetaText: { color: 'rgba(255,255,255,0.5)', fontSize: 11, lineHeight: 13 },": "  headerMetaText: { color: colors.muted, fontSize: 11, lineHeight: 14 },",
            "  headerReadOnly: { color: '#9ed1ff', fontSize: 10, lineHeight: 13, fontWeight: fontWeight.semibold },": "  headerReadOnly: { color: colors.blueLink, fontSize: 10, lineHeight: 13, fontWeight: fontWeight.semibold },",
            "  closeButton: { width: 32, height: 32, borderRadius: 16, backgroundColor: 'rgba(255,255,255,0.1)', alignItems: 'center', justifyContent: 'center' },": "  closeButton: { width: 32, height: 32, alignItems: 'center', justifyContent: 'center' },",
            "  tabText: { color: colors.muted, fontSize: 11, lineHeight: 14, fontWeight: fontWeight.semibold, textAlign: 'center' },": "  tabText: { color: colors.muted, fontSize: 12, lineHeight: 15, fontWeight: fontWeight.semibold, textAlign: 'center' },",
            "  bodyContent: { flexGrow: 1, paddingBottom: 28 },": "  bodyContent: { flexGrow: 1, paddingBottom: 16 },",
            "  groupLabel: { fontSize: 11, lineHeight: 13, letterSpacing: 0.66, fontWeight: fontWeight.bold },": "  groupLabel: { fontSize: 10, lineHeight: 13, letterSpacing: 0.6, fontWeight: fontWeight.bold },",
            "  groupBody: { gap: 24, paddingHorizontal: 14, paddingTop: 14, paddingBottom: 24, backgroundColor: colors.white },": "  groupBody: { gap: 12, paddingHorizontal: 14, paddingTop: 14, paddingBottom: 20, backgroundColor: colors.white },",
            "  findingCard: { borderRadius: 10, borderWidth: 1.5, borderColor: colors.border, borderLeftWidth: 3, borderLeftColor: colors.borderMid, backgroundColor: '#f7f7f7', paddingHorizontal: 13, paddingVertical: 13, shadowColor: '#000', shadowOffset: { width: 0, height: 1 }, shadowOpacity: 0.06, shadowRadius: 1.5, elevation: 1 },": "  findingCard: { borderRadius: 10, borderWidth: 1.5, borderColor: colors.border, backgroundColor: '#f7f7f7', paddingHorizontal: 13, paddingVertical: 13, shadowColor: '#000', shadowOffset: { width: 0, height: 1 }, shadowOpacity: 0.06, shadowRadius: 1.5, elevation: 1 },",
            "  findingCardReview: { borderColor: '#e7b1bf', borderLeftColor: colors.danger },\n": "",
            "  findingCopy: { marginTop: 12, gap: 4 },": "  findingCopy: { marginTop: 12, gap: 12 },",
            "  textBlock: { borderRadius: 8, backgroundColor: colors.white, paddingHorizontal: 10, paddingVertical: 8 },": "  textBlock: { backgroundColor: 'transparent', paddingHorizontal: 0, paddingVertical: 0 },",
            "  textBlockBordered: { borderWidth: 1, borderColor: colors.border },": "  textBlockBordered: { borderWidth: 0 },",
            "  rejectBlock: { backgroundColor: '#fff0f4', borderWidth: 1, borderColor: colors.dangerSurf },": "  rejectBlock: { borderRadius: 8, backgroundColor: '#fff0f4', borderWidth: 1, borderColor: colors.dangerSurf, paddingHorizontal: 10, paddingVertical: 8 },",
            "  evidenceAfterEmpty: { backgroundColor: '#dfffd1' },": "  evidenceAfterEmpty: { backgroundColor: '#f7f7f7' },",
            "  approveAction: { height: 40, flex: 1.4, borderRadius: 9, backgroundColor: colors.ok, flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: 5 },": "  approveAction: { height: 40, flex: 1.4, borderRadius: 9, backgroundColor: '#3a9b3a', flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: 5 },",
            "  tabContent: { flexGrow: 1, backgroundColor: colors.white, paddingHorizontal: 20, paddingVertical: 20 },": "  tabContent: { flexGrow: 1, backgroundColor: colors.white, paddingHorizontal: 14, paddingVertical: 20, gap: 12 },",
            "  generalTable: { marginTop: 10 },\n": "",
            "  generalRow: { minHeight: 34, borderBottomWidth: 1, borderBottomColor: colors.border, flexDirection: 'row', alignItems: 'center', justifyContent: 'space-between', gap: 16, paddingVertical: 8 },": "  generalRow: { minHeight: 34, borderBottomWidth: 1, borderBottomColor: colors.border, flexDirection: 'row', alignItems: 'center', justifyContent: 'space-between', gap: 16, paddingHorizontal: 12, paddingVertical: 9 },",
            "  responsiblesSection: { marginTop: 24 },\n": "",
            "  responsibleCard: { marginTop: 10, borderRadius: 10, borderWidth: 1, borderColor: colors.border, overflow: 'hidden', backgroundColor: colors.white },\n": "",
          }
          for old, new in style_replacements.items():
              replace_once(old, new, f'style replacement: {old[:36]}')

          insert_before = "  generalRow: { minHeight: 34,"
          idx = text.find(insert_before)
          if idx < 0:
              raise SystemExit('general row insertion anchor missing')
          new_styles = """  generalSectionCard: { borderRadius: 12, borderWidth: 1, borderColor: colors.border, overflow: 'hidden', backgroundColor: colors.white, shadowColor: '#000', shadowOffset: { width: 0, height: 1 }, shadowOpacity: 0.06, shadowRadius: 1.5, elevation: 1 },
  generalSectionHeader: { minHeight: 29, backgroundColor: '#f7f7f7', flexDirection: 'row', alignItems: 'center', gap: 7, paddingHorizontal: 12 },
  generalSectionTitle: { color: colors.muted, fontSize: 10, lineHeight: 13, letterSpacing: 0.5, fontWeight: fontWeight.bold },
"""
          text = text[:idx] + new_styles + text[idx:]

          end_anchor = "  reassignText: { color: colors.blueLink, fontSize: 12, fontWeight: fontWeight.semibold },\n});"
          end_replacement = """  reassignText: { color: colors.blueLink, fontSize: 12, fontWeight: fontWeight.semibold },
  footer: { minHeight: 70, borderTopWidth: 1, borderTopColor: colors.border, backgroundColor: colors.white, justifyContent: 'center', paddingHorizontal: 20, paddingTop: 15, paddingBottom: 14 },
  pdfButton: { height: 40, borderRadius: 8, borderWidth: 1.5, borderColor: colors.borderMid, backgroundColor: colors.white, flexDirection: 'row', alignItems: 'center', justifyContent: 'center', gap: 8 },
  pdfButtonText: { color: colors.body, fontSize: 13, lineHeight: 16, fontWeight: fontWeight.semibold },
});"""
          replace_once(end_anchor, end_replacement, 'footer styles')

          path.write_text(text)
          PY

      - name: Validate mobile detail
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @aurelia/contracts build
          pnpm --filter mobile-inspecciones typecheck
          pnpm --filter mobile-inspecciones lint

      - name: Commit modal fidelity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx
          git commit -m "Fideliza detalle de gestión mobile con Figma"
          git push origin HEAD:feature/inspecciones/carlo
