name: Mobile inspection detail fix

on:
  push:
    branches:
      - feat/mobile-inspection-detail-fidelity
    paths:
      - .github/workflows/mobile-inspection-detail-fix.yml

permissions:
  contents: write

jobs:
  patch-detail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-inspection-detail-fidelity
          fetch-depth: 0
      - name: Parenthesize mixed nullish expression
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/mobile-inspecciones/src/modules/inspection/InspectionDetailFigmaScreen.tsx')
          text = path.read_text()
          old = "['Ubicación', detail.general.locationLabel ?? [detail.general.latitude, detail.general.longitude].filter(Boolean).join(' ') || '—'],"
          new = "['Ubicación', detail.general.locationLabel ?? ([detail.general.latitude, detail.general.longitude].filter(Boolean).join(' ') || '—')],"
          if old not in text:
              raise SystemExit('Expected expression was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit detail correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-inspecciones/src/modules/inspection/InspectionDetailFigmaScreen.tsx
          git commit -m "Fix: corrige expresión de ubicación en detalle mobile"
          git push origin HEAD:feat/mobile-inspection-detail-fidelity
