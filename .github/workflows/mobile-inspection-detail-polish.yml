name: Mobile inspection detail polish

on:
  push:
    branches:
      - feat/mobile-inspection-detail-fidelity
    paths:
      - .github/workflows/mobile-inspection-detail-polish.yml

permissions:
  contents: write

jobs:
  polish-detail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mobile-inspection-detail-fidelity
          fetch-depth: 0
      - name: Invalidate affected inspection queries
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/mobile-inspecciones/src/modules/inspection/InspectionDetailFigmaScreen.tsx')
          text = path.read_text()
          old = """    onSuccess: async () => {
      await queryClient.invalidateQueries({ queryKey: ['mobile-inspecciones'] });
    },"""
          new = """    onSuccess: async () => {
      await Promise.all([
        queryClient.invalidateQueries({ queryKey: ['mobile-inspecciones', 'inspection-detail', inspectionId] }),
        queryClient.invalidateQueries({ queryKey: ['mobile-inspecciones', 'inspection-findings', inspectionId] }),
        queryClient.invalidateQueries({ queryKey: ['mobile-inspecciones', 'inspections'] }),
        queryClient.invalidateQueries({ queryKey: ['mobile-inspecciones', 'inspection-home-summary'] }),
      ]);
    },"""
          if old not in text:
              raise SystemExit('Expected invalidation block was not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit query invalidation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-inspecciones/src/modules/inspection/InspectionDetailFigmaScreen.tsx
          git commit -m "Fix: refresca detalle tras revisión mobile"
          git push origin HEAD:feat/mobile-inspection-detail-fidelity
