name: Mobile inspection detail validation

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/mobile-inspecciones/**
      - packages/contracts/**
      - .github/workflows/mobile-inspection-detail-validate.yml

jobs:
  mobile-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Capture typecheck
        shell: bash
        run: |
          set +e
          pnpm --filter mobile-inspecciones typecheck > typecheck.log 2>&1
          echo $? > typecheck.exit
      - name: Capture lint
        shell: bash
        run: |
          set +e
          pnpm --filter mobile-inspecciones lint > lint.log 2>&1
          echo $? > lint.exit
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-quality-logs
          path: |
            typecheck.log
            typecheck.exit
            lint.log
            lint.exit
      - name: Enforce quality gates
        shell: bash
        run: |
          test "$(cat typecheck.exit)" = "0"
          test "$(cat lint.exit)" = "0"
