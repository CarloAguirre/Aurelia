name: Mobile inspection detail validation

on:
  pull_request:
    branches:
      - main
    paths:
      - apps/mobile-inspecciones/**
      - packages/contracts/**
      - .github/workflows/mobile-inspection-detail-validate.yml

jobs:
  mobile-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck mobile
        shell: bash
        run: set -o pipefail; pnpm --filter mobile-inspecciones typecheck 2>&1 | tail -n 80
      - name: Lint mobile
        shell: bash
        run: set -o pipefail; pnpm --filter mobile-inspecciones lint 2>&1 | tail -n 80
