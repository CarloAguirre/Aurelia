name: Run mobile checklist result fidelity validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Apply Figma fidelity changes
        run: bash .github/scripts/apply-mobile-checklist-result-fidelity.sh

      - name: Install dependencies
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate mobile app
        run: |
          pnpm --filter @aurelia/contracts build
          pnpm --filter mobile-inspecciones typecheck
          pnpm --filter mobile-inspecciones lint
          pnpm --filter mobile-inspecciones test:smoke

      - name: Commit implementation and cleanup
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/mobile-inspecciones/src/modules/inspection/MobileInspectionChecklistResultPanel.tsx
          git add apps/mobile-inspecciones/src/modules/inspection/MobileInspectionDetailModal.tsx
          git commit -m "fix(mobile): fidelize checklist complete result"

          git rm .github/workflows/apply-mobile-checklist-result-fidelity.yml
          git rm .github/workflows/run-mobile-checklist-result-fidelity-pr.yml
          git rm .github/scripts/apply-mobile-checklist-result-fidelity.sh
          git commit -m "chore(ci): remove checklist result fidelity automation"

          git push origin HEAD:feature/inspecciones/carlo
