name: Temporary idempotent inspection notifications

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/tmp-idempotent-inspection-notifications.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0
      - name: Add idempotent notification creation
        shell: python
        run: |
          from pathlib import Path
          path = Path('apps/api/src/modules/notifications/notifications.service.ts')
          text = path.read_text()
          old = '''  async create(dto: CreateNotificationDto): Promise<NotificationResponse> {
    const notification = await this.notificationsRepository.save(
      this.notificationsRepository.create({
        title: dto.title,
        body: dto.body ?? null,
        category: dto.category ?? 'general',
        entityType: dto.entityType ?? null,
        entityId: dto.entityId ?? null,
        triggeredByUserId: dto.triggeredByUserId ?? null,
        metadata: dto.metadata ?? null,
      }),
    );

    const recipientUserIds = this.uniqueIds(dto.recipientUserIds);
    await this.insertRecipientsIgnoringDuplicates(notification.id, recipientUserIds);

    return this.findByIdForUser(notification.id, recipientUserIds[0] ?? null, true);
  }
'''
          new = old + '''
  async createInspectionEvent(dto: CreateNotificationDto): Promise<NotificationResponse> {
    const eventKey = this.eventKeyOf(dto.metadata ?? null);
    if (!eventKey) return this.create(dto);

    const existingRows = await this.notificationsRepository.find({ relations: { recipients: true } });
    const existing = existingRows.find((notification) => this.eventKeyOf(notification.metadata) === eventKey);
    const recipientUserIds = this.uniqueIds(dto.recipientUserIds);
    if (!existing) return this.create(dto);

    const existingRecipientIds = new Set((existing.recipients ?? []).map((recipient) => recipient.userId));
    const missingIds = recipientUserIds.filter((userId) => !existingRecipientIds.has(userId));
    if (missingIds.length > 0) {
      await this.insertRecipientsIgnoringDuplicates(existing.id, missingIds);
    }
    return this.findByIdForUser(existing.id, recipientUserIds[0] ?? null, true);
  }
'''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'Expected one create method match, found {count}')
          path.write_text(text.replace(old, new, 1))
      - name: Commit idempotent notification creation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/modules/notifications/notifications.service.ts
          git commit -m "Hace idempotentes los eventos de notificación de inspecciones"
          git push origin HEAD:feature/inspecciones/carlo
      - name: Remove temporary workflow
        run: |
          git pull --ff-only origin feature/inspecciones/carlo
          git rm .github/workflows/tmp-idempotent-inspection-notifications.yml
          git commit -m "Retira workflow temporal de notificaciones idempotentes"
          git push origin HEAD:feature/inspecciones/carlo
