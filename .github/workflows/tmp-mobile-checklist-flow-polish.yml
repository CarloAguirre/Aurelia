name: Temporary mobile checklist flow polish

on:
  pull_request:
    branches:
      - feature/inspecciones/carlo
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-checklist-flow:
    if: github.event.pull_request.head.repo.full_name == github.repository && startsWith(github.head_ref, 'automation/mobile-checklist-flow-polish-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Apply checklist flow improvements
        shell: bash
        run: |
          python -c "import base64; exec(base64.b64decode('').decode('utf-8'))"

      - name: Commit checklist flow file
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile-inspecciones/src/modules/inspection/InspectionChatScreenV2.tsx
          git commit -m "Homologa flujo checklist normativo mobile"
          git push origin HEAD:feature/inspecciones/carlo

      - name: Remove temporary workflow
        shell: bash
        run: |
          rm .github/workflows/tmp-mobile-checklist-flow-polish.yml
          git add .github/workflows/tmp-mobile-checklist-flow-polish.yml
          git commit -m "Retira workflow temporal de mejoras checklist"
          git push origin HEAD:feature/inspecciones/carlo
