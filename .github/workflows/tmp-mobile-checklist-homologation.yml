name: Temporary mobile checklist homologation

# Second push activates the workflow after it exists on the branch.
on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/tmp-mobile-checklist-homologation.yml

permissions:
  contents: write

jobs:
  patch-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Homologate checklist flow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          screen_path = Path('apps/mobile-inspecciones/src/modules/inspection/InspectionChatScreenV2.tsx')
          screen = screen_path.read_text(encoding='utf-8')

          checklist_pattern = re.compile(
              r"  async function askCompanyForChecklist\(\) \{.*?\n  \}\n\n  async function askFindingType\(\)",
              re.S,
          )
          checklist_replacement = """  async function askCompanySuggestion(context: 'finding' | 'checklist') {
    push('typing');
    try {
      const companies = await queryClient.fetchQuery({
        queryKey: [`responsible-companies-${context}`],
        queryFn: fetchResponsibleCompaniesLocalFirst,
        staleTime: 300000,
      });
      clearTyping();

      if (!companies.length) {
        pushError('No hay empresas contratistas disponibles en catálogos.');
        return;
      }

      const state = useManualInspectionDraft.getState();
      let reason = 'Recomendación basada en el área, sector y empresas disponibles.';
      let suggestedCompany = companies[0];

      try {
        const ai = await suggestCompany({
          area: state.areaName ?? '',
          sector: state.sectorName ?? '',
          availableCompanies: companies.map((item) => item.name),
        });
        reason = ai.suggestion;
        const normalizedSuggestion = ai.suggestion.toLowerCase();
        const match = companies.find((item) =>
          normalizedSuggestion.includes(item.name.toLowerCase()) ||
          item.name.toLowerCase().includes(normalizedSuggestion),
        );
        if (match) suggestedCompany = match;
      } catch {
        // Keep the catalog fallback when AI is unavailable.
      }

      setStep(4);
      push('bot', 'Te sugiero una empresa responsable según el área, sector y empresas disponibles.');
      push('companyPick', { companies, company: suggestedCompany, reason } as CompanyPickData);
    } catch {
      clearTyping();
      pushError('No pude cargar empresas responsables.', () => {
        void askCompanySuggestion(context);
      });
    }
  }

  async function askCompanyForChecklist() {
    await askCompanySuggestion('checklist');
  }

  async function askFindingType()"""
          screen, count = checklist_pattern.subn(checklist_replacement, screen, count=1)
          if count != 1:
              raise SystemExit(f'Checklist company flow: expected one match, found {count}')

          finding_pattern = re.compile(
              r"  async function askCompanyForFinding\(\) \{.*?\n  \}\n\n  function openCompanyList",
              re.S,
          )
          finding_replacement = """  async function askCompanyForFinding() {
    await askCompanySuggestion('finding');
  }

  function openCompanyList"""
          screen, count = finding_pattern.subn(finding_replacement, screen, count=1)
          if count != 1:
              raise SystemExit(f'Finding company flow: expected one match, found {count}')

          old = """  function renderSummary(message: Msg) {
    const state = useManualInspectionDraft.getState();

    if (state.inspectionType === InspectionType.ENVIRONMENTAL) {"""
          new = """  function renderSummary(message: Msg) {
    const state = useManualInspectionDraft.getState();
    const responsibleNames = (loadedUsersByCompany.current.get(state.findingCompanyId ?? '') ?? [])
      .filter((user) => state.findingResponsibleIds.includes(user.id))
      .map((user) => user.fullName)
      .join(', ');
    const responsibleValue = responsibleNames || (
      state.findingResponsibleIds.length ? `${state.findingResponsibleIds.length} seleccionados` : '—'
    );

    if (state.inspectionType === InspectionType.ENVIRONMENTAL) {"""
          if screen.count(old) != 1:
              raise SystemExit('Summary responsible names anchor not found exactly once')
          screen = screen.replace(old, new, 1)

          old = """            <SummaryRow label=\"Responsables\" value={state.findingResponsibleIds.length ? `${state.findingResponsibleIds.length} seleccionados` : '—'} />"""
          new = """            <SummaryRow label=\"Responsables\" value={responsibleValue} />"""
          if screen.count(old) != 1:
              raise SystemExit('Finding responsible summary row not found exactly once')
          screen = screen.replace(old, new, 1)

          old = """          <SummaryRow label=\"Fecha\" value={state.inspectionDate} />
          <SummaryRow label=\"Ubicación\" value={state.locationLabel} />
          <SummaryRow label=\"Plantilla\" value={state.templateName ?? '—'} />
          <SummaryRow label=\"Empresa EECC\" value={state.findingCompanyName ?? (noCount ? 'Pendiente' : 'No aplica')} />"""
          new = """          <SummaryRow label=\"Fecha\" value={state.inspectionDate} />
          <SummaryRow label=\"Ubicación\" value={state.locationLabel} />
          <SummaryRow label=\"Registro\" value={state.templateName ?? '—'} />
          <SummaryRow label=\"Empresa EECC\" value={state.findingCompanyName ?? (noCount ? 'Pendiente' : 'No aplica')} />
          <SummaryRow label=\"Responsables\" value={noCount ? responsibleValue : 'No aplica'} />"""
          if screen.count(old) != 1:
              raise SystemExit('Checklist summary rows not found exactly once')
          screen = screen.replace(old, new, 1)

          screen_path.write_text(screen, encoding='utf-8')

          bubble_path = Path('apps/mobile-inspecciones/src/shared/components/chat/BotBubble.tsx')
          bubble = bubble_path.read_text(encoding='utf-8')
          anchor = """  if (normalized === 'Selecciona empresa responsable de los hallazgos.') {
    return 'Selecciona la **empresa responsable de los hallazgos**.';
  }
"""
          addition = anchor + """  if (normalized === 'Te sugiero una empresa responsable según el área, sector y empresas disponibles.') {
    return 'Te sugiero una **empresa responsable** según el área, sector y empresas disponibles.';
  }
"""
          if bubble.count(anchor) != 1:
              raise SystemExit('Bot copy company anchor not found exactly once')
          bubble = bubble.replace(anchor, addition, 1)
          bubble_path.write_text(bubble, encoding='utf-8')
          PY

      - name: Commit checklist homologation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/tmp-mobile-checklist-homologation.yml
          git add apps/mobile-inspecciones/src/modules/inspection/InspectionChatScreenV2.tsx apps/mobile-inspecciones/src/shared/components/chat/BotBubble.tsx .github/workflows/tmp-mobile-checklist-homologation.yml
          git commit -m "Homologa flujo checklist normativo mobile"
          git push origin HEAD:feature/inspecciones/carlo
