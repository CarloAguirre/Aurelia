name: Temporary mobile summary fidelity

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/tmp-mobile-summary-fidelity.yml

permissions:
  contents: write

jobs:
  patch-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0

      - name: Patch mobile inspection summary
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/mobile-inspecciones/src/modules/inspection/InspectionChatScreenV2.tsx')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "import { SafeAreaProvider } from 'react-native-safe-area-context';",
                  "import { SafeAreaProvider, useSafeAreaInsets } from 'react-native-safe-area-context';",
              ),
              (
                  "  const saving = checklistSave.isPending || findingSave.isPending;\n",
                  "  const saving = checklistSave.isPending || findingSave.isPending;\n  const activeSummaryMessage = useMemo(\n    () => [...messages].reverse().find((message) => message.t === 'summary') ?? null,\n    [messages],\n  );\n",
              ),
              (
                  "          <TouchableOpacity onPress={() => submitInspection(message.id)} disabled={saving} style={styles.saveButton}>\n            <Text style={styles.saveButtonText}>{saving ? 'Guardando…' : '✓ Guardar hallazgo'}</Text>\n          </TouchableOpacity>\n",
                  "",
              ),
              (
                  "        <TouchableOpacity onPress={() => submitInspection(message.id)} disabled={saving} style={styles.saveButton}>\n          <Text style={styles.saveButtonText}>{saving ? 'Guardando…' : '✓ Guardar checklist'}</Text>\n        </TouchableOpacity>\n",
                  "",
              ),
              (
                  "          <ChatInput onSend={sendText} disabled={waiting === null} />",
                  "          {activeSummaryMessage ? (\n            <SummarySaveFooter\n              saving={saving}\n              onSave={() => {\n                void submitInspection(activeSummaryMessage.id);\n              }}\n            />\n          ) : (\n            <ChatInput onSend={sendText} disabled={waiting === null} />\n          )}",
              ),
              (
                  "function SummaryRow({ label, value }: { label: string; value: string }) {",
                  "function SummarySaveFooter({ saving, onSave }: { saving: boolean; onSave: () => void }) {\n  const insets = useSafeAreaInsets();\n\n  return (\n    <View style={[styles.summaryFooter, { paddingBottom: insets.bottom + spacing.xs }]}>\n      <TouchableOpacity\n        activeOpacity={0.8}\n        disabled={saving}\n        onPress={onSave}\n        style={[styles.summaryFooterButton, saving && styles.summaryFooterButtonDisabled]}\n      >\n        <Text style={styles.summaryFooterText}>{saving ? 'Guardando…' : '✓ Guardar inspección'}</Text>\n      </TouchableOpacity>\n      <View style={styles.summaryFooterHomeIndicatorBar}>\n        <View style={styles.summaryFooterHomeIndicator} />\n      </View>\n    </View>\n  );\n}\n\nfunction SummaryRow({ label, value }: { label: string; value: string }) {",
              ),
              (
                  "  questionCard: {",
                  "  summaryFooter: {\n    paddingTop: spacing.sm,\n    paddingHorizontal: spacing.md,\n    backgroundColor: colors.white,\n    borderTopColor: colors.border,\n    borderTopWidth: 1,\n  },\n  summaryFooterButton: {\n    width: '100%',\n    height: 48,\n    alignItems: 'center',\n    justifyContent: 'center',\n    backgroundColor: '#35A137',\n    borderRadius: 12,\n    shadowColor: '#35A137',\n    shadowOpacity: 0.18,\n    shadowRadius: 8,\n    shadowOffset: { width: 0, height: 2 },\n    elevation: 2,\n  },\n  summaryFooterButtonDisabled: {\n    opacity: 0.7,\n  },\n  summaryFooterText: {\n    color: colors.white,\n    fontSize: 15,\n    fontWeight: fontWeight.bold,\n  },\n  summaryFooterHomeIndicatorBar: {\n    height: 18,\n    alignItems: 'center',\n    justifyContent: 'center',\n  },\n  summaryFooterHomeIndicator: {\n    width: 120,\n    height: 4,\n    borderRadius: 2,\n    backgroundColor: colors.borderMid,\n  },\n  questionCard: {",
              ),
          ]

          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected exactly one match, found {count}: {old[:90]!r}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit summary fidelity
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/tmp-mobile-summary-fidelity.yml
          git add apps/mobile-inspecciones/src/modules/inspection/InspectionChatScreenV2.tsx .github/workflows/tmp-mobile-summary-fidelity.yml
          git commit -m "Fideliza footer del resumen mobile"
          git push origin HEAD:feature/inspecciones/carlo
