name: Temporary inspection dashboard scope

on:
  push:
    branches:
      - feature/inspecciones/carlo
    paths:
      - .github/workflows/tmp-scope-inspection-dashboard.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/inspecciones/carlo
          fetch-depth: 0
      - name: Apply scoped dashboard service
        shell: python
        run: |
          from pathlib import Path

          path = Path('apps/api/src/modules/inspections/inspection-dashboard.service.ts')
          text = path.read_text()

          def replace_once(old: str, new: str):
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'Expected one match, found {count}: {old[:100]}')
              text = text.replace(old, new, 1)

          replace_once(
              "export interface ManagementTableQuery {\n",
              "export interface InspectionDataScope {\n  inspectionIds?: string[];\n}\n\nexport interface ManagementTableQuery {\n",
          )
          replace_once(
              "  async getManagementKpis(): Promise<InspectionManagementKpisResponse> {\n    const [inspections, findings] = await Promise.all([this.inspections.find(), this.findings.find()]);",
              "  async getManagementKpis(scope: InspectionDataScope = {}): Promise<InspectionManagementKpisResponse> {\n    const [allInspections, allFindings] = await Promise.all([this.inspections.find(), this.findings.find()]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);",
          )
          replace_once(
              "  async getManagementTable(query: ManagementTableQuery = {}): Promise<InspectionManagementTableResponse> {\n    const [inspections, findings, companies, areas, sectors, users, inspectionTypes] = await Promise.all([",
              "  async getManagementTable(query: ManagementTableQuery = {}, scope: InspectionDataScope = {}): Promise<InspectionManagementTableResponse> {\n    const [allInspections, allFindings, companies, areas, sectors, users, inspectionTypes] = await Promise.all([",
          )
          replace_once(
              "      this.inspectionTypes.find(),\n    ]);\n    const now = new Date();",
              "      this.inspectionTypes.find(),\n    ]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);\n    const now = new Date();",
          )
          replace_once(
              "  async getSummary(query: DashboardQuery = {}): Promise<InspectionDashboardSummaryResponse> {\n    const [inspections, findings] = await Promise.all([this.inspections.find(), this.findings.find()]);",
              "  async getSummary(query: DashboardQuery = {}, scope: InspectionDataScope = {}): Promise<InspectionDashboardSummaryResponse> {\n    const [allInspections, allFindings] = await Promise.all([this.inspections.find(), this.findings.find()]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);",
          )
          replace_once(
              "  async getCharts(query: DashboardQuery = {}): Promise<InspectionDashboardChartsResponse> {\n    const [inspections, findings, areas] = await Promise.all([",
              "  async getCharts(query: DashboardQuery = {}, scope: InspectionDataScope = {}): Promise<InspectionDashboardChartsResponse> {\n    const [allInspections, allFindings, areas] = await Promise.all([",
          )
          replace_once(
              "      this.areas.find(),\n    ]);\n    const filter = buildDashboardDateFilter(query);",
              "      this.areas.find(),\n    ]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);\n    const filter = buildDashboardDateFilter(query);",
          )
          replace_once(
              "  async getCompanyAnalysis(query: DashboardQuery = {}): Promise<InspectionDashboardCompanyAnalysisResponse> {\n    const [inspections, findings, companies] = await Promise.all([",
              "  async getCompanyAnalysis(query: DashboardQuery = {}, scope: InspectionDataScope = {}): Promise<InspectionDashboardCompanyAnalysisResponse> {\n    const [allInspections, allFindings, companies] = await Promise.all([",
          )
          replace_once(
              "      this.companies.find(),\n    ]);\n    const filter = buildDashboardDateFilter(query);",
              "      this.companies.find(),\n    ]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);\n    const filter = buildDashboardDateFilter(query);",
          )
          replace_once(
              "  async getOpenFindings(query: DashboardQuery = {}): Promise<InspectionDashboardOpenFindingsResponse> {\n    const [inspections, findings, companies, areas] = await Promise.all([",
              "  async getOpenFindings(query: DashboardQuery = {}, scope: InspectionDataScope = {}): Promise<InspectionDashboardOpenFindingsResponse> {\n    const [allInspections, allFindings, companies, areas] = await Promise.all([",
          )
          replace_once(
              "      this.areas.find(),\n    ]);\n    const filter = buildDashboardDateFilter(query);",
              "      this.areas.find(),\n    ]);\n    const { inspections, findings } = this.applyScope(allInspections, allFindings, scope);\n    const filter = buildDashboardDateFilter(query);",
          )
          replace_once(
              "  private createInspectionStatusCounter(): Record<InspectionStatus, number> {",
              "  private applyScope(\n    inspections: InspectionEntity[],\n    findings: InspectionFindingEntity[],\n    scope: InspectionDataScope,\n  ): { inspections: InspectionEntity[]; findings: InspectionFindingEntity[] } {\n    if (scope.inspectionIds === undefined) return { inspections, findings };\n    const allowedIds = new Set(scope.inspectionIds);\n    return {\n      inspections: inspections.filter((inspection) => allowedIds.has(inspection.id)),\n      findings: findings.filter((finding) => allowedIds.has(finding.inspectionId)),\n    };\n  }\n\n  private createInspectionStatusCounter(): Record<InspectionStatus, number> {",
          )

          path.write_text(text)
      - name: Commit dashboard service
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/api/src/modules/inspections/inspection-dashboard.service.ts
          git commit -m "Aplica scope uniforme al dashboard de inspecciones"
          git push origin HEAD:feature/inspecciones/carlo
      - name: Remove temporary workflow
        run: |
          git pull --ff-only origin feature/inspecciones/carlo
          git rm .github/workflows/tmp-scope-inspection-dashboard.yml
          git commit -m "Retira workflow temporal de scope dashboard"
          git push origin HEAD:feature/inspecciones/carlo
