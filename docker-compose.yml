services:
  postgres:
    image: postgres:16-alpine
    container_name: aurelia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-aurelia}
    ports:
      - '${DB_PORT:-5433}:5432'
    volumes:
      - aurelia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-aurelia}']
      interval: 10s
      timeout: 5s
      retries: 5

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: aurelia-libretranslate
    restart: unless-stopped
    environment:
      LT_UPDATE_MODELS: 'true'
      LT_LOAD_ONLY: es,en
    ports:
      - '${REPORT_TRANSLATION_PORT:-5000}:5000'
    volumes:
      - aurelia_translation_models:/home/libretranslate/.local:rw
    healthcheck:
      test: ['CMD-SHELL', './venv/bin/python scripts/healthcheck.py']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

volumes:
  aurelia_pgdata:
  aurelia_translation_models:
